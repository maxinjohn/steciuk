# STECI UK Parish — one service, one compose file.
# Dev vs prod is controlled entirely by .env (APP_ENV, APP_DEBUG, etc.).
#
#   cp .env.example .env
#   docker compose build
#   docker compose up -d

name: steciuk

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: steciuk/app:${APP_VERSION:-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-steciuk}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_STORAGE_PATH: ${APP_STORAGE_PATH:-/var/www/html/storage}
      DB_DATABASE: ${DB_DATABASE:-/var/www/html/storage/database/database.sqlite}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      RUN_SEED: ${RUN_SEED:-false}
      AUTO_BOOTSTRAP: ${AUTO_BOOTSTRAP:-true}
      AUTO_SYNC_REFERENCE: ${AUTO_SYNC_REFERENCE:-false}
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"
    volumes:
      - ${STORAGE_HOST_PATH:-steci-storage}:/var/www/html/storage
      - ${BOOTSTRAP_CACHE_HOST_PATH:-steci-bootstrap-cache}:/var/www/html/bootstrap/cache
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/up > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s

volumes:
  steci-storage:
  steci-bootstrap-cache:
