# =============================================================================
# STECI UK Parish — Production Docker Compose
#
# Usage:
#   cp .env.example .env
#   # Edit .env — set APP_KEY, APP_URL, ports, etc.
#   docker compose build
#   docker compose up -d
#
# All host ports are configurable via .env (see Docker section in .env.example)
# =============================================================================

name: steciuk

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: steciuk/app:${APP_VERSION:-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-steciuk}-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/storage/database/database.sqlite
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      RUN_SEED: ${RUN_SEED:-false}
    volumes:
      - steci-storage:/var/www/html/storage
      - steci-bootstrap-cache:/var/www/html/bootstrap/cache
    networks:
      - steci-network
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x php-fpm > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  nginx:
    build:
      context: .
      dockerfile: Dockerfile
      target: nginx
    image: steciuk/nginx:${APP_VERSION:-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-steciuk}-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"
      - "${NGINX_HTTPS_PORT:-8443}:443"
    volumes:
      - steci-storage:/var/www/html/storage:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - steci-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/up > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  queue:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: steciuk/app:${APP_VERSION:-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-steciuk}-queue
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/storage/database/database.sqlite
      RUN_MIGRATIONS: "false"
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600", "--no-interaction"]
    volumes:
      - steci-storage:/var/www/html/storage
      - steci-bootstrap-cache:/var/www/html/bootstrap/cache
    depends_on:
      app:
        condition: service_healthy
    networks:
      - steci-network
    profiles:
      - queue

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: steciuk/app:${APP_VERSION:-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-steciuk}-scheduler
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/storage/database/database.sqlite
      RUN_MIGRATIONS: "false"
    command: ["sh", "-c", "while true; do php artisan schedule:run --no-interaction --verbose; sleep 60; done"]
    volumes:
      - steci-storage:/var/www/html/storage
      - steci-bootstrap-cache:/var/www/html/bootstrap/cache
    depends_on:
      app:
        condition: service_healthy
    networks:
      - steci-network
    profiles:
      - scheduler

networks:
  steci-network:
    driver: bridge

volumes:
  steci-storage:
    driver: local
  steci-bootstrap-cache:
    driver: local
