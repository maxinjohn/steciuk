# =============================================================================
# STECI UK Parish — Single-container Docker Compose
#
# One container runs nginx, PHP-FPM, queue worker, and task scheduler.
#
# Usage:
#   cp .env.example .env
#   docker compose build
#   docker compose up -d
# =============================================================================

name: steciuk

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: steciuk/app:${APP_VERSION:-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-steciuk}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_STORAGE_PATH: ${APP_STORAGE_PATH:-/var/www/html/storage}
      DB_CONNECTION: sqlite
      DB_DATABASE: ${DB_DATABASE:-/var/www/html/storage/database/database.sqlite}
      PUBLIC_STORAGE_PATH: ${PUBLIC_STORAGE_PATH:-}
      PRIVATE_STORAGE_PATH: ${PRIVATE_STORAGE_PATH:-}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      RUN_SEED: ${RUN_SEED:-false}
      SEED_MODE: ${SEED_MODE:-bootstrap}
      RUN_QUEUE_WORKER: ${RUN_QUEUE_WORKER:-true}
      RUN_SCHEDULER: ${RUN_SCHEDULER:-true}
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"
      - "${NGINX_HTTPS_PORT:-8443}:443"
    volumes:
      - ${STORAGE_HOST_PATH:-steci-storage}:/var/www/html/storage
      - ${BOOTSTRAP_CACHE_HOST_PATH:-steci-bootstrap-cache}:/var/www/html/bootstrap/cache
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/up > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  steci-storage:
    driver: local
  steci-bootstrap-cache:
    driver: local
