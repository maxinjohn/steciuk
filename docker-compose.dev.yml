# Development overrides — bind-mount source code into the single container.
# Frontend assets: run `npm run dev` on your host, or `npm run build` after changes.
#
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  app:
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      RUN_MIGRATIONS: "true"
      RUN_SEED: "true"
      SEED_MODE: bootstrap
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
      - ${STORAGE_HOST_PATH:-steci-storage}:/var/www/html/storage
